<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keta1930</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="particles"></canvas>

    <nav class="pixel-nav" id="nav">
        <div class="nav-inner">
            <a href="#" class="nav-logo">keta1930</a>
            <div class="nav-links">
                <a href="#about" class="nav-link active" data-section="about">
                    <span data-en="About" data-zh="关于">About</span>
                </a>
                <a href="#projects" class="nav-link" data-section="projects">
                    <span data-en="Projects" data-zh="项目">Projects</span>
                </a>
                <a href="#papers" class="nav-link" data-section="papers">
                    <span data-en="Papers" data-zh="论文">Papers</span>
                </a>
            </div>
            <button class="lang-btn" id="langSwitcher">
                <span id="currentLang">EN</span>
            </button>
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-scene">
            <div class="hero-bg-fallback"></div>
            <img src="images/banner.png" alt="" class="hero-bg">
            <div class="hero-content">
                <h1 class="hero-title">keta1930</h1>
                <p class="hero-tagline" data-en="indie dev · agent engineer · stardew farmer" data-zh="独立开发者 · Agent 工程师 · 星露谷农民">indie dev · agent engineer · stardew farmer</p>
            </div>
        </div>
    </header>

    <section id="about" class="game-panel">
        <div class="panel-header">
            <span class="panel-icon">🏠</span>
            <h2 data-en="About Me" data-zh="关于我">About Me</h2>
        </div>
        <div class="panel-body">
            <div class="about-grid">
                <div class="avatar-frame">
                    <img src="images/avatar.png" class="pixel-avatar" alt="keta">
                </div>
                <div class="about-content">
                    <div class="about-tags" id="aboutTags"></div>
                    <div class="about-bio" id="aboutBio"></div>
                    <div class="about-contact" id="aboutContact"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="projects" class="game-panel">
        <div class="panel-header">
            <span class="panel-icon">⚒️</span>
            <h2 data-en="Projects" data-zh="项目">Projects</h2>
        </div>
        <div class="panel-body">
            <div class="item-grid" id="projectsGrid"></div>
        </div>
    </section>

    <section id="papers" class="game-panel">
        <div class="panel-header">
            <span class="panel-icon">📚</span>
            <h2 data-en="Papers" data-zh="论文">Papers</h2>
        </div>
        <div class="panel-body">
            <div class="item-grid" id="papersGrid"></div>
        </div>
    </section>

    <footer class="pixel-footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="mailto:yandeheng1@gmail.com"><i class="fas fa-envelope"></i> yandeheng1@gmail.com</a>
                <a href="https://github.com/keta1930" target="_blank"><i class="fab fa-github"></i> @keta1930</a>
            </div>
            <p class="footer-text" data-en="Built with ❤️ and hosted on GitHub Pages" data-zh="用 ❤️ 构建，托管于 GitHub Pages">Built with ❤️ and hosted on GitHub Pages</p>
        </div>
    </footer>

    <div class="season-badge" id="seasonBadge"></div>

    <script src="js/script.js"></script>
</body>
</html>
